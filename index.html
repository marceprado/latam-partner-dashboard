<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;background:#F2F2F7;color:#1C1C1E}
.hdr{background:linear-gradient(135deg,#1C1C1E,#2C2C2E);color:#fff;padding:20px 32px 16px}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.hdr h1{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}
.hsub{color:#98989D;font-size:11px;margin-top:3px}
.stats{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
.stat{background:rgba(255,255,255,.09);border-radius:10px;padding:8px 13px}
.sv{font-size:20px;font-weight:700}.sl{font-size:9px;color:#98989D;text-transform:uppercase;letter-spacing:.4px;margin-top:1px}
.red{color:#FF453A}.grn{color:#30D158}
.rfbtn{background:#007AFF;color:#fff;border:none;border-radius:9px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.fbar{background:#fff;border-bottom:1px solid #E5E5EA;padding:14px 32px;display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:10px;font-weight:700;color:#6C6C70;text-transform:uppercase;letter-spacing:.5px}
.fg select,.fg input{border:1.5px solid #D1D1D6;border-radius:10px;padding:9px 12px;font-size:13px;font-family:inherit;background:#F2F2F7;color:#1C1C1E;outline:none;cursor:pointer;transition:border .2s}
.fg select:focus,.fg input:focus{border-color:#007AFF;background:#fff}
#ps{width:240px}#ts{width:210px}
.clr{border:1.5px solid #D1D1D6;border-radius:10px;padding:9px 14px;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:#8E8E93;align-self:flex-end;transition:all .15s}
.clr:hover{background:#FF3B30;color:#fff;border-color:#FF3B30}
.detail{padding:20px 32px 50px}
.empty{text-align:center;color:#8E8E93;padding:80px 20px;font-size:14px;line-height:2}
.empty .big{font-size:40px;display:block;margin-bottom:10px}
.ph{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding:15px 20px;background:#fff;border-radius:14px;box-shadow:0 1px 5px rgba(0,0,0,.06)}
.pf{font-size:30px}.pn{font-size:22px;font-weight:700;flex:1}
.pm{font-size:12px;color:#8E8E93;margin-top:2px}
.tb{border-radius:20px;font-size:11px;font-weight:700;padding:4px 11px}
.tb1{background:#FF9F0A18;color:#FF9F0A;border:1px solid #FF9F0A50}
.tb2{background:#34C75918;color:#34C759;border:1px solid #34C75950}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.box{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.05);overflow:hidden;display:flex;flex-direction:column}
.box.full{grid-column:1/-1}
.bh{padding:13px 16px 11px;border-bottom:1px solid #F5F5F5;display:flex;align-items:center;gap:8px}
.bi{font-size:18px}.bt{font-size:14px;font-weight:700;flex:1}
.bc{font-size:12px;font-weight:700;border-radius:11px;padding:2px 9px}
.bb{padding:0 14px 12px;flex:1;overflow-y:auto;max-height:260px}
.be{text-align:center;color:#C7C7CC;font-size:12px;padding:22px 0;font-style:italic}
.er{display:flex;align-items:flex-start;gap:7px;padding:7px 2px;border-bottom:1px solid #F5F5F7}
.er:last-child{border:none}
.ed{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.es{font-size:11px;flex:1;line-height:1.4}.unread .es{font-weight:700}
.dt{font-size:10px;color:#8E8E93;white-space:nowrap;margin-left:4px}
.mr{display:flex;align-items:flex-start;gap:8px;padding:7px 2px;border-bottom:1px solid #F5F5F7}
.mr:last-child{border:none}
.mi{font-size:13px;flex-shrink:0}.mt{font-size:11px;flex:1;line-height:1.4}

.nw{padding:10px 14px 12px;border-top:1px solid #F5F5F7}
.nt{width:100%;min-height:48px;border:1px solid #E5E5EA;border-radius:8px;padding:7px 9px;font-size:12px;font-family:inherit;resize:vertical;outline:none;background:#FAFAFA;color:#1C1C1E}
.nt:focus{border-color:#007AFF;background:#fff}
.sc{position:relative}.sc input{padding-right:30px}
.arr{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#8E8E93;font-size:11px;pointer-events:none}
.dd{display:none;position:absolute;top:calc(100% + 4px);left:0;width:100%;background:#fff;border:1.5px solid #D1D1D6;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.12);max-height:260px;overflow-y:auto;z-index:200}
.dd.open{display:block}
.dg{padding:6px 0 2px;border-bottom:1px solid #F2F2F7}.dg:last-child{border:none}
.dgl{font-size:10px;font-weight:700;color:#8E8E93;text-transform:uppercase;letter-spacing:.4px;padding:4px 12px 2px}
.do{padding:8px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s}
.do:hover,.do.sel{background:#007AFF18;color:#007AFF;font-weight:600}

const TODAY=new Date().toISOString().slice(0,10);
const TL={'1':'⭐ Tier 1','2':'🌎 Tier 2','3':'🔵 Tier 3'};
const TLL={'1':'⭐ Tier 1 — Brazil & Mexico','2':'🌎 Tier 2 — LATAM Partners','3':'🔵 Tier 3 — Others'};
const BM={'Names Feature Adoption':{i:'📲',c:'#5856D6'},'Compliance':{i:'📋',c:'#FF9500'},'Billings and Metrics':{i:'💰',c:'#34C759'},'Other Questions':{i:'💬',c:'#8E8E93'},'Meetings':{i:'📅',c:'#007AFF'}};
let AP=null,AT='all',DI=-1;
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(m,c){const t=document.getElementById('toast');t.textContent=m;t.style.background=c||'#1C1C1E';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function buildDD(){
  const dd=document.getElementById('dd'),q=document.getElementById('ps').value.toLowerCase();
  const g={'1':[],'2':[],'3':[]};
  Object.entries(D).forEach(([n,d])=>{
    if(AT!=='all'&&String(d.tier)!==AT)return;
    if(q&&!n.toLowerCase().includes(q)&&!d.country.toLowerCase().includes(q))return;
    g[String(d.tier)].push([n,d]);
  });
  let h='',tot=0;
  ['1','2','3'].forEach(t=>{
    const items=g[t].sort((a,b)=>a[0].localeCompare(b[0]));
    if(!items.length)return;tot+=items.length;
    h+=`<div class="dg"><div class="dgl">${TLL[t]}</div>`;
    items.forEach(([n,d])=>{
      const ud=d.unread>0?'<span style="width:6px;height:6px;border-radius:50%;background:#FF3B30;display:inline-block;margin-left:6px;vertical-align:middle"></span>':'';
      h+=`<div class="do${n===AP?' sel':''}" data-n="${esc(n)}" onclick="pick(this)">${d.flag} <strong>${esc(n)}</strong><span style="font-size:11px;color:#8E8E93;margin-left:6px">${d.country}</span>${ud}</div>`;
    });
    h+='</div>';
  });
  dd.innerHTML=tot?h:'<div style="padding:14px;text-align:center;color:#8E8E93;font-size:12px">No partners match</div>';
  DI=-1;
}
function openDD(){buildDD();document.getElementById('dd').classList.add('open');}
function closeDD(){document.getElementById('dd').classList.remove('open');}
document.addEventListener('click',e=>{if(!document.getElementById('sc').contains(e.target))closeDD();});
function filterDD(){buildDD();document.getElementById('dd').classList.add('open');}
function onTier(){
  AT=document.getElementById('ts').value;buildDD();
  if(AP&&AT!=='all'&&D[AP]&&String(D[AP].tier)!==AT){
    AP=null;document.getElementById('ps').value='';
    document.getElementById('detail').innerHTML='<div class="empty"><span class="big">🌎</span>Select a partner above</div>';
  }
}
function pick(el){AP=el.getAttribute('data-n');document.getElementById('ps').value=AP;closeDD();render(AP);}
function keyDD(e){
  const opts=[...document.querySelectorAll('.do')];
  if(e.key==='ArrowDown'){e.preventDefault();DI=Math.min(DI+1,opts.length-1);opts.forEach((o,i)=>o.classList.toggle('sel',i===DI));opts[DI]?.scrollIntoView({block:'nearest'});}
  else if(e.key==='ArrowUp'){e.preventDefault();DI=Math.max(DI-1,0);opts.forEach((o,i)=>o.classList.toggle('sel',i===DI));}
  else if(e.key==='Enter'){e.preventDefault();if(DI>=0&&opts[DI])pick(opts[DI]);else if(opts.length===1)pick(opts[0]);}
  else if(e.key==='Escape')closeDD();
}
function clearAll(){document.getElementById('ps').value='';document.getElementById('ts').value='all';AT='all';AP=null;closeDD();document.getElementById('detail').innerHTML='<div class="empty"><span class="big">🌎</span>Select a partner above</div>';}
function getNote(n){try{return localStorage.getItem('note_'+n)||'';}catch{return'';}}
function setNote(n,v){try{localStorage.setItem('note_'+n,v);toast('✅ Note saved','#1A7A3A');}catch(e){toast('⚠️ Could not save','#C0392B');}}
function render(name){
  const d=D[name];if(!d)return;
  const tb=`<span class="tb tb${d.tier}">${TL[d.tier]}</span>`;
  const ub=d.unread>0?`<span class="ub">${d.unread} unread</span>`:'';
  let h=`<div class="ph"><span class="pf">${d.flag}</span><div style="flex:1"><div class="pn">${esc(name)}</div><div class="pm">${d.country} · ${d.total} emails (last 4 weeks) · ${TLL[d.tier]}</div></div>${tb} ${ub}</div><div class="grid">`;
  ['Names Feature Adoption','Compliance','Billings and Metrics','Other Questions'].forEach(bn=>{
    const m=BM[bn],items=d.boxes[bn]||[];
    h+=`<div class="box"><div class="bh" style="border-left:3px solid ${m.c}"><span class="bi">${m.i}</span><span class="bt">${bn}</span><span class="bc" style="background:${m.c}18;color:${m.c}">${items.length}</span></div><div class="bb">`;
    h+=items.length?items.map(e=>`<div class="er${e.read?'':' unread'}"><div class="ed" style="background:${m.c}"></div><span class="es">${esc(e.subject)}</span><span class="dt">${e.date}</span></div>`).join(''):'<div class="be">No inquiries in the last 4 weeks</div>';
    h+='</div></div>';
  });
  const mm=BM['Meetings'],mtg=d.meetings||[];
  h+=`<div class="box full"><div class="bh" style="border-left:3px solid ${mm.c}"><span class="bi">${mm.i}</span><span class="bt">Meetings with ${esc(name)} <span style="font-size:11px;font-weight:400;color:#8E8E93">· from Calendar</span></span><span class="bc" style="background:${mm.c}18;color:${mm.c}">${mtg.length}</span></div><div class="bb" style="max-height:180px">`;
  h+=mtg.length?mtg.map(m=>{const f=m.date>TODAY;return`<div class="mr"><span class="mi">${f?'📆':'📅'}</span><span class="mt">${esc(m.title)}</span><span class="md${f?' fut':''}">${m.date}${f?' ↑':''}</span></div>`;}).join(''):'<div class="be">No calendar meetings found in the last 4 weeks</div>';
  const nid='nt_'+name.replace(/[^a-z0-9]/gi,'_');
  h+=`</div><div class="nw"><textarea class="nt" id="${nid}" placeholder="📝 Notes about ${esc(name)}…" onblur="setNote(this.getAttribute('data-p'),this.value)" data-p="${esc(name)}">${esc(getNote(name))}</textarea></div></div></div>`;
  document.getElementById('detail').innerHTML=h;
}
